services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gestion_tchap
      POSTGRES_USER: tchap
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env before starting the production stack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    # Pas de port exposé en prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tchap -d gestion_tchap"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: Dockerfile
    # Pas de volume source en prod — le code est dans l'image (COPY . .)
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET in .env before starting the production stack}
      DATABASE_URL: postgresql://tchap:${DB_PASSWORD:?Set DB_PASSWORD in .env before starting the production stack}@postgres:5432/gestion_tchap
      TCHAP_SERVICE_URL: http://tchap-bridge:3000
      TCHAP_SERVICE_KEY: ${TCHAP_SERVICE_KEY:?Set TCHAP_SERVICE_KEY in .env before starting the production stack}
      DEFAULT_URI: ${DEFAULT_URI:?Set DEFAULT_URI in .env before starting the production stack}
    command: >
      sh -c "php bin/console app:seed-sysadmin && chown -R www-data:www-data var && php-fpm"
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s = @fsockopen(\"127.0.0.1\", 9000); exit($$s ? 0 : 1);'"]
      interval: 5s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: ./docker
      dockerfile: Dockerfile.nginx
    ports:
      - "${APP_PORT:-8088}:80"
    volumes:
      - ./public:/var/www/html/public:ro
    depends_on:
      php:
        condition: service_healthy
    restart: unless-stopped

  tchap-bridge:
    build:
      context: ./tchap-service
      dockerfile: Dockerfile
    # Pas de volume source en prod — le code est dans l'image
    volumes:
      - tchap_data:/app/data
    environment:
      PORT: 3000
      HOST: "0.0.0.0"
      API_KEY: ${TCHAP_SERVICE_KEY:?Set TCHAP_SERVICE_KEY in .env before starting the production stack}
      TCHAP_HOMESERVER: https://matrix.agent.interieur.tchap.gouv.fr
    restart: unless-stopped

volumes:
  postgres_data:
  tchap_data:
