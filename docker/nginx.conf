server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # Logs
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # Headers de sécurité HTTP
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloque l'accès aux fichiers sensibles
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }

    # Gestion des URLs pour Symfony
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Configuration pour PHP-FPM (Symfony)
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;  # Nom du service PHP dans docker-compose.yml
        fastcgi_index index.php;
        include fastcgi_params;

        # Paramètres spécifiques pour Symfony
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Désactive le buffering pour Symfony
        fastcgi_buffering off;
        fastcgi_request_buffering off;
    }

    # Bloque l'accès direct aux fichiers PHP (sauf index.php)
    location ~ \.php$ {
        return 404;
    }

    # Pas de cache pour les assets en dev (rechargement immédiat)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        access_log off;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
