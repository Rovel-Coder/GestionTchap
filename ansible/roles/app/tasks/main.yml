---
# ── Clé SSH pour Git (git pull depuis la VM) ────────────────────────────────

- name: Création du répertoire .ssh pour deploy
  ansible.builtin.file:
    path: "{{ deploy_home }}/.ssh"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0700"

- name: Génération d'une clé SSH Ed25519 pour l'accès Git
  community.crypto.openssh_keypair:
    path: "{{ deploy_home }}/.ssh/id_ed25519_git"
    type: ed25519
    comment: "gestion-tchap-deploy@{{ inventory_hostname }}"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0600"
  register: deploy_ssh_key

- name: Ajout du serveur Git aux known_hosts
  ansible.builtin.known_hosts:
    name: "{{ git_host }}"
    key: "{{ lookup('pipe', 'ssh-keyscan ' + git_host + ' 2>/dev/null') }}"
    path: "{{ deploy_home }}/.ssh/known_hosts"
    state: present
  become_user: "{{ deploy_user }}"

- name: Configuration SSH pour utiliser la clé de déploiement
  ansible.builtin.blockinfile:
    path: "{{ deploy_home }}/.ssh/config"
    create: true
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED — Git deploy key"
    block: |
      Host {{ git_host }}
        IdentityFile {{ deploy_home }}/.ssh/id_ed25519_git
        IdentitiesOnly yes
        StrictHostKeyChecking yes

- name: Affichage de la clé publique (à ajouter comme Deploy Key sur GitLab)
  ansible.builtin.debug:
    msg:
      - "======================================================="
      - "ACTION REQUISE : Ajoutez cette clé comme Deploy Key"
      - "sur GitLab → Settings → Repository → Deploy keys"
      - "(cocher 'Grant read permissions to this key')"
      - "======================================================="
      - "{{ deploy_ssh_key.public_key }}"
      - "======================================================="
  when: deploy_ssh_key.changed

# ── Création du répertoire de l'application ─────────────────────────────────

- name: Création du répertoire de l'application
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Clonage / mise à jour du dépôt Git
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: "{{ app_branch }}"
    force: false
  become_user: "{{ deploy_user }}"
  register: git_result

- name: Déploiement du fichier .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  register: env_changed

- name: Construction des images Docker
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files: ["{{ compose_file }}"]
    build: always
    state: present
  become_user: "{{ deploy_user }}"
  when: git_result.changed or env_changed.changed

- name: Démarrage / mise à jour des services
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files: ["{{ compose_file }}"]
    state: present
    pull: policy
  become_user: "{{ deploy_user }}"

- name: Attendre que l'application réponde
  ansible.builtin.uri:
    url: "http://localhost:{{ app_port }}"
    method: GET
    status_code: [200, 302, 401]
    timeout: 5
  retries: 12
  delay: 5
  register: health
  until: health.status in [200, 302, 401]

# ── Timer systemd de mise à jour automatique ────────────────────────────────

- name: Déploiement du script de mise à jour
  ansible.builtin.template:
    src: update.sh.j2
    dest: /opt/gestion-tchap-update.sh
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"
  notify: Reload systemd

- name: Déploiement du service systemd
  ansible.builtin.template:
    src: gestion-tchap-update.service.j2
    dest: /etc/systemd/system/gestion-tchap-update.service
    mode: "0644"
  notify: Reload systemd

- name: Déploiement du timer systemd
  ansible.builtin.template:
    src: gestion-tchap-update.timer.j2
    dest: /etc/systemd/system/gestion-tchap-update.timer
    mode: "0644"
  notify: Reload systemd

- name: Activation et démarrage du timer de mise à jour
  ansible.builtin.systemd:
    name: gestion-tchap-update.timer
    enabled: true
    state: started
    daemon_reload: true
