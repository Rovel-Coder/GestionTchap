---
# Ce fichier doit être chiffré avec ansible-vault.
# Ne pas remplir manuellement — utiliser le playbook init-secrets.yml :
#
#   ansible-playbook ansible/playbooks/init-secrets.yml
#
# Ce playbook demande uniquement le mot de passe PostgreSQL et génère
# automatiquement APP_SECRET et TCHAP_SERVICE_KEY.
#
# Pour éditer après chiffrement :
#   ansible-vault edit ansible/inventory/group_vars/vault.yml

vault_db_password: "CHANGEME_mot_de_passe_postgres"
vault_app_secret: "CHANGEME_genere_automatiquement_par_init-secrets.yml"
vault_tchap_service_key: "CHANGEME_genere_automatiquement_par_init-secrets.yml"
