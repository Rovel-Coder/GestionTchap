---
# ── Utilisateur de déploiement ──────────────────────────────────────────────
deploy_user: deploy
deploy_group: deploy
deploy_home: /home/deploy

# ── Répertoire de l'application ─────────────────────────────────────────────
app_dir: /opt/gestion-tchap
git_host: github.com                           # ← hostname Git (github.com ou GitLab interne)
app_repo: git@github.com:VOTRE_USER/gestion-personnel-tchap-PHP.git
app_branch: main

# Mettre à true uniquement si app_repo utilise SSH (git@…)
# Laisser à false pour un repo HTTPS public
git_use_ssh: false

# ── Port exposé par Nginx ────────────────────────────────────────────────────
app_port: 8088

# ── Docker Compose file à utiliser en prod ──────────────────────────────────
compose_file: docker-compose.prod.yml

# ── Firewall : ports ouverts ─────────────────────────────────────────────────
ufw_rules:
  - { port: 22,   proto: tcp, rule: allow, comment: SSH }
  - { port: "{{ app_port }}", proto: tcp, rule: allow, comment: App }

# ── Mise à jour automatique ──────────────────────────────────────────────────
# Intervalle du timer systemd — format systemd : 5min, 10min, 1h…
update_interval: 1h

# ── Variables .env de l'application (secrets dans vault.yml) ────────────────
app_env: prod
app_default_uri: https://votre-domaine.fr      # À adapter
app_cors_origin: https://votre-domaine.fr      # À adapter
tchap_homeserver: https://matrix.agent.interieur.tchap.gouv.fr
