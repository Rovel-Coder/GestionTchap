---
# ── Inventaire de production ─────────────────────────────────────────────────
#
# CAS 1 — Pilotage depuis une machine distante (depuis votre poste) :
#   Remplacer ansible_host par l'IP de la VM, et commenter ansible_connection.
#
# CAS 2 — Bootstrap depuis la VM elle-même (ansible installé sur la cible) :
#   Utiliser ansible_host: localhost + ansible_connection: local
#   C'est la configuration par défaut ci-dessous.

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3

  children:
    prod:
      hosts:
        gestion-tchap:
          ansible_host: localhost
          ansible_port: 22
          ansible_connection: local   # Supprimer si pilotage depuis un poste distant
