---
# Playbook d'initialisation de la VM (à lancer une seule fois)
# Usage : ansible-playbook ansible/playbooks/setup.yml --ask-vault-pass
#
# Compatible avec deux modes de connexion :
#   - Accès root direct    : ansible_user=root (become inutile mais inoffensif)
#   - Utilisateur sudo     : ansible_user=monuser (ex: ubuntu, vboxuser…)
#
# Exemples :
#   ansible-playbook ansible/playbooks/setup.yml --ask-vault-pass
#   ansible-playbook ansible/playbooks/setup.yml --ask-vault-pass -e ansible_user=ubuntu
#
# Après exécution : seul l'utilisateur 'deploy' avec clé SSH peut se connecter

- name: Configuration initiale de la VM
  hosts: prod
  become: true

  pre_tasks:
    - name: Générer la clé SSH locale si absente
      community.crypto.openssh_keypair:
        path: "~/.ssh/id_ed25519"
        type: ed25519
        comment: "gestion-tchap-controller"
      delegate_to: localhost
      run_once: true

    - name: Vérification de la connectivité
      ansible.builtin.ping:

  roles:
    - common
    - docker

  post_tasks:
    - name: Résumé de la configuration
      ansible.builtin.debug:
        msg:
          - "✓ VM configurée : {{ inventory_hostname }} ({{ ansible_host }})"
          - "✓ Docker installé"
          - "✓ Utilisateur deploy créé avec accès Docker"
          - "✓ UFW actif — ports ouverts : {{ ufw_rules | map(attribute='port') | list }}"
          - "✓ SSH : authentification par mot de passe désactivée"
          - ""
          - "Prochaine étape : ansible-playbook ansible/playbooks/deploy.yml --ask-vault-pass"
