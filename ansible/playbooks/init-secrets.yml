---
# Initialisation des secrets — à lancer UNE SEULE FOIS avant le premier déploiement
#
# Ce playbook :
#   1. Demande uniquement le mot de passe PostgreSQL (le seul à choisir manuellement)
#   2. Génère automatiquement APP_SECRET et TCHAP_SERVICE_KEY
#   3. Écrit vault.yml et le chiffre avec ansible-vault
#
# Usage :
#   ansible-playbook ansible/playbooks/init-secrets.yml
#
# ⚠ Ne pas relancer après le premier déploiement — les secrets seraient régénérés
#   et les sessions existantes invalidées.

- name: Initialisation des secrets de déploiement
  hosts: localhost
  gather_facts: false

  vars_prompt:
    - name: db_password
      prompt: "Mot de passe PostgreSQL (choisir un mot de passe fort)"
      private: true
      confirm: true

    - name: vault_password
      prompt: "Mot de passe vault Ansible (pour chiffrer vault.yml — à retenir)"
      private: true
      confirm: true

  tasks:

    - name: Générer APP_SECRET (32 octets aléatoires en base64)
      ansible.builtin.command:
        cmd: python3 -c "import secrets, base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
      delegate_to: localhost
      register: app_secret_gen
      changed_when: false

    - name: Générer TCHAP_SERVICE_KEY (32 octets aléatoires en hexadécimal)
      ansible.builtin.command:
        cmd: python3 -c "import secrets; print(secrets.token_hex(32))"
      delegate_to: localhost
      register: tchap_key_gen
      changed_when: false

    - name: Écrire vault.yml avec les secrets générés
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../inventory/group_vars/vault.yml"
        content: |
          ---
          # Secrets générés automatiquement par init-secrets.yml
          # ⚠ Ne pas modifier manuellement — relancer init-secrets.yml si nécessaire
          vault_db_password: "{{ db_password }}"
          vault_app_secret: "{{ app_secret_gen.stdout }}"
          vault_tchap_service_key: "{{ tchap_key_gen.stdout }}"
        mode: "0600"

    - name: Chiffrer vault.yml avec ansible-vault
      ansible.builtin.shell:
        cmd: "echo '{{ vault_password }}' | ansible-vault encrypt --vault-password-file /dev/stdin {{ playbook_dir }}/../inventory/group_vars/vault.yml"
      changed_when: true
      no_log: true

    - name: Résumé
      ansible.builtin.debug:
        msg:
          - "✓ Secrets générés et chiffrés dans vault.yml"
          - "✓ APP_SECRET       : généré automatiquement (base64 32 octets)"
          - "✓ TCHAP_SERVICE_KEY: généré automatiquement (hex 32 octets)"
          - "✓ DB_PASSWORD      : mot de passe saisi"
          - ""
          - "Prochaine étape :"
          - "  ansible-playbook ansible/playbooks/setup.yml --ask-vault-pass"
