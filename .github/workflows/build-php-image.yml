name: Build and publish Docker images

on:
  push:
    branches:
      - main

jobs:
  build-php:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm/v7
          tags: |
            ghcr.io/rovel-coder/gestiontchap-php:latest
            ghcr.io/rovel-coder/gestiontchap-php:${{ github.sha }}

  build-nginx:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile.nginx
          push: true
          platforms: linux/amd64,linux/arm/v7
          tags: |
            ghcr.io/rovel-coder/gestiontchap-nginx:latest
            ghcr.io/rovel-coder/gestiontchap-nginx:${{ github.sha }}

  build-bridge:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bridge image
        uses: docker/build-push-action@v5
        with:
          context: ./tchap-service
          file: ./tchap-service/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm/v7
          tags: |
            ghcr.io/rovel-coder/gestiontchap-bridge:latest
            ghcr.io/rovel-coder/gestiontchap-bridge:${{ github.sha }}
