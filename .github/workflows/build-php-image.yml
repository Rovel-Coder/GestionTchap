name: Build and Push Docker Images (Multi-Arch)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PHP: ${{ github.repository }}-php  # Correction : IMAGE_NAME_PHPS -> IMAGE_NAME_PHP
  IMAGE_NAME_NGINX: ${{ github.repository }}-nginx

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure QEMU pour émuler ARM64 sur x86_64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Configure Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Connecte-toi à GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Construction de l'image PHP ---
      # Extrait les métadonnées pour l'image PHP
      - name: Extract metadata for PHP
        id: meta-php
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PHP }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          flavor: |
            latest=false  # Évite de taguer avec "latest" pour les PR

      # Construit et pousse l'image PHP multi-arch
      - name: Build and push PHP Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile  # Chemin explicite
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-php.outputs.tags }}
          labels: ${{ steps.meta-php.outputs.labels }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=gha,scope=${{ env.IMAGE_NAME_PHP }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME_PHP }}
          # Ajoute des arguments de build si nécessaire (ex: pour Symfony)
          build-args: |
            APP_ENV=prod

      # --- Construction de l'image Nginx ---
      # Extrait les métadonnées pour l'image Nginx
      - name: Extract metadata for Nginx
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_NGINX }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          flavor: |
            latest=false

      # Construit et pousse l'image Nginx multi-arch
      - name: Build and push Nginx Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.nginx  # Chemin explicite vers ton Dockerfile Nginx
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=gha,scope=${{ env.IMAGE_NAME_NGINX }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME_NGINX }}
